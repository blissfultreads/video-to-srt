<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video to SRT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0c29;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 560px; width: 100%; padding: 20px; }
        h1 { font-size: 2.2rem; text-align: center; margin-bottom: 8px; }
        .subtitle {
            text-align: center; color: rgba(255,255,255,0.6);
            margin-bottom: 40px; font-size: 0.95rem;
        }
        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.25);
            border-radius: 16px; padding: 60px 20px;
            text-align: center; cursor: pointer;
            transition: all 0.3s; background: rgba(255,255,255,0.03);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #a6e3a1; background: rgba(166,227,161,0.05);
        }
        .drop-zone .icon { font-size: 3rem; margin-bottom: 16px; }
        .drop-zone p { color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .drop-zone .formats {
            margin-top: 12px; font-size: 0.8rem; color: rgba(255,255,255,0.35);
        }
        input[type="file"] { display: none; }
        .file-info {
            display: none; background: rgba(255,255,255,0.06);
            border-radius: 12px; padding: 20px; margin-top: 20px;
        }
        .file-info.show { display: block; }
        .file-name { font-weight: 600; margin-bottom: 4px; word-break: break-all; }
        .file-size { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
        .btn {
            display: block; width: 100%; padding: 16px;
            border: none; border-radius: 12px; font-size: 1rem;
            font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.2s;
        }
        .btn-generate { background: #a6e3a1; color: #0f0c29; }
        .btn-generate:hover { background: #94d990; }
        .btn-generate:disabled {
            background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed;
        }
        .progress-area { display: none; margin-top: 24px; }
        .progress-area.show { display: block; }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1); border-radius: 8px; height: 8px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: #a6e3a1; border-radius: 8px;
            width: 0%; transition: width 0.5s;
        }
        .progress-text {
            margin-top: 12px; text-align: center; font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; animation: spin 1s linear infinite; }
        .msg {
            display: none; border-radius: 10px; padding: 14px 18px;
            margin-top: 20px; font-size: 0.9rem;
        }
        .msg.show { display: block; }
        .msg.error {
            background: rgba(243,139,139,0.15); border: 1px solid rgba(243,139,139,0.3); color: #f38b8b;
        }
        .msg.success {
            background: rgba(166,227,161,0.1); border: 1px solid rgba(166,227,161,0.25);
            color: #a6e3a1; text-align: center;
        }
        .notice {
            margin-top: 40px; padding: 16px; border-radius: 10px;
            background: rgba(255,255,255,0.04); font-size: 0.8rem;
            color: rgba(255,255,255,0.4); line-height: 1.6;
        }
        .notice strong { color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

<div class="container">
    <h1>Video to SRT</h1>
    <p class="subtitle">브라우저에서 바로 자막을 생성합니다 — 서버 업로드 없음</p>

    <div class="drop-zone" id="dropZone">
        <div class="icon">🎬</div>
        <p>비디오 파일을 드래그하거나 클릭하여 선택하세요</p>
        <div class="formats">MP4 · MOV · AVI · MKV · M4V</div>
    </div>
    <input type="file" id="fileInput" accept=".mp4,.mov,.avi,.mkv,.m4v,video/*">

    <div class="file-info" id="fileInfo">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
    </div>

    <button class="btn btn-generate" id="btnGenerate" disabled>SRT 자막 생성</button>

    <div class="progress-area" id="progressArea">
        <div class="progress-bar-bg">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText"></div>
    </div>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="notice">
        <strong>안내</strong><br>
        최초 실행 시 Whisper 모델(~150MB)을 다운로드합니다 (이후 캐시됨).<br>
        모든 처리는 브라우저에서 수행되며, 파일이 서버로 전송되지 않습니다.
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.2';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const btnGenerate = document.getElementById('btnGenerate');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    let selectedFile = null;
    let transcriber = null;

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function formatTimestamp(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        const ms = Math.round((seconds - Math.floor(seconds)) * 1000);
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
    }

    function chunksToSrt(chunks) {
        return chunks.map((chunk, i) => {
            const start = formatTimestamp(chunk.timestamp[0]);
            const end = formatTimestamp(chunk.timestamp[1]);
            const text = chunk.text.trim();
            return `${i + 1}\n${start} --> ${end}\n${text}\n`;
        }).join('\n');
    }

    function setProgress(pct, text) {
        progressBar.style.width = pct + '%';
        progressText.innerHTML = text;
    }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
    }

    function extractAudio(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const arrayBuffer = reader.result;
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    const float32 = audioBuffer.getChannelData(0);
                    audioCtx.close();
                    resolve(float32);
                } catch (e) {
                    reject(new Error('오디오 디코딩 실패: ' + e.message));
                }
            };
            reader.onerror = () => reject(new Error('파일 읽기 실패'));
            reader.readAsArrayBuffer(file);
        });
    }

    function selectFile(file) {
        if (!file) return;
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        fileInfo.classList.add('show');
        btnGenerate.disabled = false;
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
        progressArea.classList.remove('show');
    }

    // 드래그 & 드롭
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => selectFile(e.target.files[0]));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); selectFile(e.dataTransfer.files[0]); });

    // 생성 버튼
    btnGenerate.addEventListener('click', async () => {
        if (!selectedFile) return;
        btnGenerate.disabled = true;
        progressArea.classList.add('show');
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        try {
            // 1. 오디오 추출
            setProgress(10, '<span class="spinner">⏳</span> 오디오 추출 중...');
            const audioData = await extractAudio(selectedFile);

            // 2. 모델 로드
            if (!transcriber) {
                setProgress(20, '<span class="spinner">⏳</span> Whisper 모델 다운로드 중... (최초 1회)');
                transcriber = await pipeline(
                    'automatic-speech-recognition',
                    'onnx-community/whisper-small',
                    {
                        dtype: { encoder_model: 'fp32', decoder_model_merged: 'q4' },
                        device: 'wasm',
                    }
                );
            }

            // 3. 음성 인식
            setProgress(50, '<span class="spinner">⏳</span> 음성 인식 처리 중... (시간이 걸릴 수 있습니다)');
            const result = await transcriber(audioData, {
                language: null,
                task: 'transcribe',
                return_timestamps: true,
                chunk_length_s: 30,
                stride_length_s: 5,
            });

            setProgress(90, '<span class="spinner">⏳</span> SRT 파일 생성 중...');

            // 4. SRT 변환
            const chunks = result.chunks || [];
            if (chunks.length === 0) {
                throw new Error('음성이 감지되지 않았습니다.');
            }
            const srtContent = chunksToSrt(chunks);

            // 5. 다운로드
            setProgress(100, '완료!');
            const blob = new Blob([srtContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = selectedFile.name.replace(/\.[^.]+$/, '.srt');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            successMsg.textContent = '✓ SRT 파일이 다운로드되었습니다!';
            successMsg.classList.add('show');

        } catch (err) {
            progressArea.classList.remove('show');
            showError(err.message);
        }

        btnGenerate.disabled = false;
    });
</script>

</body>
</html>
